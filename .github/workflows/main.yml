name: Build Kernel

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Latest Commit Hash
        id: get_hash
        run: |
          # Fetching hash for the Samsung Kernel
          HASH=$(git ls-remote https://github.com/exynos1480/android_kernel_samsung_a55x HEAD | awk '{ print $1 }')
          echo "latest_hash=$HASH" >> $GITHUB_OUTPUT
          echo "short_hash=${HASH:0:7}" >> $GITHUB_OUTPUT

      - name: Cache Last Hash
        id: cache_hash
        uses: actions/cache@v4
        with:
          path: .last_hash
          key: kernel-hash-${{ steps.get_hash.outputs.latest_hash }}
          restore-keys: |
            kernel-hash-

      - name: Decide and Notify
        id: decide
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          # Using local file comparison to ensure the 'skip' logic is bulletproof
          if [ -f .last_hash ] && [ "$(cat .last_hash)" == "${{ steps.get_hash.outputs.latest_hash }}" ]; then
            echo "run_build=false" >> $GITHUB_OUTPUT
            echo "No new commits. Skipping build."
          else
            echo "run_build=true" >> $GITHUB_OUTPUT
            echo "${{ steps.get_hash.outputs.latest_hash }}" > .last_hash
            
            # Using HTML mode to ensure your emojis and hashes send without errors
            MESSAGE="ⓘ <b>New Kernel Commit!</b>%0A%0AHash: <code>${{ steps.get_hash.outputs.short_hash }}</code>%0AStarting Build Process..."
            curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
                 -d "chat_id=$TO" \
                 -d "parse_mode=HTML" \
                 -d "text=$MESSAGE"
          fi

      - name: Maximize Disk Space
        if: steps.decide.outputs.run_build == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -a -f

      - name: Install dependencies
        if: steps.decide.outputs.run_build == 'true'
        run: |
          sudo apt update
          sudo apt install -y git python3 bc bison flex zip curl libssl-dev libelf-dev zlib1g-dev

      - name: Clone build script
        if: steps.decide.outputs.run_build == 'true'
        run: git clone https://github.com/fiqys/kernel_build_script.git

      - name: Build kernel
        if: steps.decide.outputs.run_build == 'true'
        run: |
          cd kernel_build_script
          chmod +x build_kernel.py
          ./build_kernel.py --clean --build-all --flashable-zip

      - name: Success Notification
        if: success() && steps.decide.outputs.run_build == 'true'
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          BUILD_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="✓ <b>Kernel Build Succeeded!</b>%0A%0AThe A55 kernel artifacts are ready.%0A<a href='$BUILD_URL'>View Artifacts</a>"
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
               -d "chat_id=$TO" \
               -d "parse_mode=HTML" \
               -d "text=$MESSAGE"

      - name: Failure Notification
        if: failure() && steps.decide.outputs.run_build == 'true'
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          BUILD_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="✗ <b>Kernel Build Failed!</b>%0A%0AThe build encountered an error.%0A<a href='$BUILD_URL'>View Logs</a>"
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
               -d "chat_id=$TO" \
               -d "parse_mode=HTML" \
               -d "text=$MESSAGE"

      - name: Upload artifacts
        if: steps.decide.outputs.run_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ steps.get_hash.outputs.short_hash }}
          path: |
            out/dist/*.zip
            out/dist/*.img
            kernel_build_script/out/dist/*.zip
            kernel_build_script/out/dist/*.img
