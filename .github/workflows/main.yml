name: Build Kernel

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for new commits
        id: check
        run: |
          # Fetch the latest commit hash from the target repo
          LATEST_HASH=$(git ls-remote https://github.com/exynos1480/android_kernel_samsung_a55x HEAD | awk '{ print $1 }')
          
          # Try to load the last known hash from a local file (stored in the repo or cache)
          # Note: For a truly automated "don't own it" setup, 
          # most users just let the build run or use a cache to store the hash.
          echo "Latest commit: $LATEST_HASH"
          echo "hash=$LATEST_HASH" >> $GITHUB_OUTPUT

      # OPTIONAL: Add logic here to compare the hash if you want to save minutes.
      # Otherwise, the script below will just run every 30 mins:

      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -a -f

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git python3 bc bison flex zip curl libssl-dev libelf-dev zlib1g-dev

      - name: Clone build script
        run: git clone https://github.com/fiqys/kernel_build_script.git

      - name: Build kernel
        run: |
          cd kernel_build_script
          chmod +x build_kernel.py
          ./build_kernel.py --clean --build-all --flashable-zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ steps.check.outputs.hash }}
          path: |
            kernel_build_script/out/dist/*.zip
            kernel_build_script/out/dist/*.img
